<!DOCTYPE html>
<!--
  VELQUOR — Logo Reveal Animation
  HyperFrames standalone composition
  Open in browser to preview / drag timeline scrubber.
  Duration: 4s  |  Canvas: 1920×1080  |  Background: #0A0A0F
-->
<html>
<head>
  <meta charset="utf-8"/>
  <title>VELQUOR — Logo Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #preview-wrap {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    #stage {
      position: relative;
      width: 1920px; height: 1080px;
      transform-origin: top left;
      background: #0A0A0F;
      overflow: hidden;
    }
    /* ── Scrubber controls ── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 14px 24px;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; gap: 16px;
      z-index: 9999; font-family: system-ui, sans-serif;
    }
    #scrubber { flex: 1; cursor: pointer; accent-color: #C9A84C; }
    #time-label { color: #888; font-size: 12px; min-width: 56px; text-align: right; }
    #play-btn {
      background: #C9A84C; color: #000; border: none; border-radius: 6px;
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="preview-wrap">
  <div id="stage">
    <div
      data-composition-id="velquor-logo"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="4"
      data-track-index="0"
    >

      <!-- ── Scene content ── -->
      <div class="scene-content">

        <!-- VQ mark (SVG) — 340×340, centered at (960,540) -->
        <svg
          id="logo-mark"
          width="340" height="340"
          viewBox="0 0 400 400"
          style="position:absolute; left:790px; top:370px;"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- V — left leg -->
          <path id="v-left"
            d="M 40 110 L 126 292"
            fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>
          <!-- V — right leg -->
          <path id="v-right"
            d="M 126 292 L 212 110"
            fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>
          <!-- Q — 310° arc, gap at 122°–172° -->
          <path id="q-arc"
            d="M 202.7 192.3 A 74 74 0 1 1 236.8 244.8"
            fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>
          <!-- Gold slash -->
          <path id="slash"
            d="M 126 294 L 363 100"
            fill="none" stroke="#C9A84C" stroke-width="26" stroke-linecap="round"/>
        </svg>

        <!-- VELQUOR logotype — fades in below the mark -->
        <div id="logotype" style="
          position: absolute;
          left: 50%; top: 754px;
          transform: translateX(-50%);
          font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif;
          font-size: 52px;
          font-weight: 700;
          letter-spacing: 0.22em;
          color: #FFFFFF;
          white-space: nowrap;
          opacity: 0;
        ">VELQUOR</div>

        <!-- Tagline -->
        <div id="tagline" style="
          position: absolute;
          left: 50%; top: 832px;
          transform: translateX(-50%);
          font-family: 'Inter', system-ui, sans-serif;
          font-size: 18px;
          font-weight: 400;
          letter-spacing: 0.28em;
          color: #505050;
          white-space: nowrap;
          opacity: 0;
          text-transform: uppercase;
        ">Your Trading Operating System</div>

      </div><!-- /scene-content -->

      <style>
        [data-composition-id="velquor-logo"] {
          position: absolute;
          inset: 0;
          background: #0A0A0F;
        }
        .scene-content {
          width: 100%; height: 100%;
          position: relative;
        }
      </style>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {}

        // ── Path lengths (pre-computed) ──
        const V_LEG   = 201.3   // sqrt(86²+182²)
        const Q_ARC   = 400.2   // 2π×74×(310/360)
        const SLASH   = 306.3   // sqrt(237²+194²)

        const tl = gsap.timeline({ paused: true })

        // ── Set initial dash state ──
        tl.set('#v-left',  { strokeDasharray: V_LEG, strokeDashoffset: V_LEG }, 0)
        tl.set('#v-right', { strokeDasharray: V_LEG, strokeDashoffset: V_LEG }, 0)
        tl.set('#q-arc',   { strokeDasharray: Q_ARC, strokeDashoffset: Q_ARC }, 0)
        tl.set('#slash',   { strokeDasharray: SLASH, strokeDashoffset: SLASH  }, 0)

        // ── V draws in ──
        tl.to('#v-left',  { strokeDashoffset: 0, duration: 0.48, ease: 'power2.out' }, 0.15)
        tl.to('#v-right', { strokeDashoffset: 0, duration: 0.48, ease: 'power2.out' }, 0.42)

        // ── Q traces ──
        tl.to('#q-arc', { strokeDashoffset: 0, duration: 0.82, ease: 'power2.inOut' }, 0.68)

        // ── Gold slash cuts in — fast and aggressive ──
        tl.to('#slash', { strokeDashoffset: 0, duration: 0.22, ease: 'power3.in' }, 1.38)

        // ── Slash glow blooms ──
        tl.to('#slash', {
          filter: 'drop-shadow(0 0 14px rgba(201,168,76,0.9)) drop-shadow(0 0 40px rgba(201,168,76,0.4))',
          duration: 0.35, ease: 'power2.out'
        }, 1.6)

        // ── Mark scales in slightly (subtle confidence) ──
        tl.from('#logo-mark', { scale: 0.92, transformOrigin: '50% 50%', duration: 0.5, ease: 'power2.out' }, 0.1)

        // ── Logotype fades up ──
        tl.fromTo('#logotype',
          { opacity: 0, y: 16 },
          { opacity: 1, y: 0, duration: 0.55, ease: 'power3.out' },
          1.72
        )

        // ── Tagline fades in ──
        tl.fromTo('#tagline',
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: 'power2.out' },
          2.05
        )

        // ── Glow pulse (hold state) ──
        tl.to('#slash', {
          filter: 'drop-shadow(0 0 8px rgba(201,168,76,0.5)) drop-shadow(0 0 20px rgba(201,168,76,0.2))',
          duration: 0.9, ease: 'power2.inOut'
        }, 2.5)

        window.__timelines['velquor-logo'] = tl

        // ── Standalone preview player ──
        const DURATION = 4
        let playing = false, rafId = null, startTime = null, pauseAt = 0

        function scale() {
          const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080)
          document.getElementById('stage').style.transform = `scale(${s})`
        }
        scale()
        window.addEventListener('resize', scale)

        const scrubber  = document.getElementById('scrubber')
        const playBtn   = document.getElementById('play-btn')
        const timeLabel = document.getElementById('time-label')

        scrubber.min   = 0
        scrubber.max   = 1000
        scrubber.value = 0

        function seek(t) {
          tl.seek(t)
          scrubber.value   = (t / DURATION) * 1000
          timeLabel.textContent = t.toFixed(2) + 's'
        }

        function tick(ts) {
          if (!startTime) startTime = ts
          const elapsed = pauseAt + (ts - startTime) / 1000
          if (elapsed >= DURATION) { seek(DURATION); stop(); return }
          seek(elapsed)
          rafId = requestAnimationFrame(tick)
        }

        function play() {
          if (playing) return
          playing = true; startTime = null
          playBtn.textContent = '⏸'
          rafId = requestAnimationFrame(tick)
        }

        function stop() {
          if (!playing) return
          playing = false
          pauseAt = tl.time()
          playBtn.textContent = '▶'
          cancelAnimationFrame(rafId)
        }

        playBtn.onclick = () => playing ? stop() : play()

        scrubber.addEventListener('input', () => {
          stop()
          pauseAt = (scrubber.value / 1000) * DURATION
          seek(pauseAt)
        })

        // Auto-play on load
        seek(0)
        setTimeout(play, 200)
      </script>
    </div>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <button id="play-btn">▶</button>
  <input id="scrubber" type="range" step="1"/>
  <span id="time-label">0.00s</span>
</div>

</body>
</html>
