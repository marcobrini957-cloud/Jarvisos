<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- VELQUOR — VQ mark -->
  <!-- Container -->
  <rect width="400" height="400" rx="72" fill="#0A0A0F"/>

  <!-- V — left leg -->
  <path id="v-left"  d="M 40 110 L 126 292"
        fill="none" stroke="#FFFFFF" stroke-width="24"
        stroke-linecap="round"/>

  <!-- V — right leg -->
  <path id="v-right" d="M 126 292 L 212 110"
        fill="none" stroke="#FFFFFF" stroke-width="24"
        stroke-linecap="round"/>

  <!-- Q — 310° arc, gap at 122°–172° (lower-left) where the slash enters -->
  <!-- Center (276,182) r=74. At 172°: (202.7,192.3). At 122°: (236.8,244.8).   -->
  <!-- Arc goes clockwise from 172° → 180° → 270° → 0° → 90° → 122° = 310°.    -->
  <path id="q-arc"
        d="M 202.7 192.3 A 74 74 0 1 1 236.8 244.8"
        fill="none" stroke="#FFFFFF" stroke-width="24"
        stroke-linecap="round"/>

  <!-- Gold slash — emerges from V apex, cuts through Q's gap, exits upper-right -->
  <path id="slash"
        d="M 126 294 L 363 100"
        fill="none" stroke="#C9A84C" stroke-width="26"
        stroke-linecap="round"/>
</svg>
