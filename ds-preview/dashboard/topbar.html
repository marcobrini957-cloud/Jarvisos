<!-- @dsCard group="Dashboard" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:#000; --s1:#0C0C0C; --bd:rgba(255,255,255,0.06); --bd2:rgba(255,255,255,0.10);
    --t1:#F2F2F2; --t2:#707070; --t3:#383838;
    --ac:#4D8FFF; --gr2:#00FF85; --re:#FF3347; --go2:#FFB830; --cy2:#00EEFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; }
  .topbar {
    height: 52px;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--bd2);
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg,#FFB830,#F5B040); display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#000; }
  .brand { font-size:13px;font-weight:700;letter-spacing:-0.01em; }
  .spacer { flex:1; }
  .session-row { display:flex;align-items:center;gap:10px; }
  .live-dot { width:7px;height:7px;border-radius:50%;background:#00EEFF;box-shadow:0 0 0 2px rgba(0,222,232,0.2),0 0 8px rgba(0,222,232,0.5); }
  .session-label { font-size:12px;font-weight:600;color:#00EEFF; }
  .time { font-size:11px;color:var(--t3);font-family:monospace; }
  .divider { width:1px;height:16px;background:var(--bd2); }
  .btn {
    display:flex;align-items:center;gap:6px;
    padding:5px 10px;border-radius:7px;font-size:11px;font-weight:500;
    background:var(--s1);border:1px solid var(--bd2);color:var(--t2);cursor:pointer;
  }
  .btn.mt5 { color:var(--gr2);border-color:rgba(0,217,110,0.2);background:rgba(0,217,110,0.06); }
  .dot-green { width:6px;height:6px;border-radius:50%;background:var(--gr2); }
  .avatar { width:28px;height:28px;border-radius:50%;background:rgba(255,176,48,0.15);border:1px solid rgba(255,176,48,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#FFB830; }
  .badge { font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(0,217,110,0.1);color:var(--gr2);border:1px solid rgba(0,217,110,0.2); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">V</div>
      <span class="brand">VELQUOR</span>
    </div>

    <div class="divider"></div>

    <div class="session-row">
      <div class="live-dot"></div>
      <span class="session-label">London Session</span>
      <div class="divider"></div>
      <span class="time">10:42 CET</span>
      <span class="time" style="color:#383838">09:42 UTC</span>
    </div>

    <div class="spacer"></div>

    <div class="btn mt5">
      <div class="dot-green"></div>
      MT5 Connected
      <span class="badge">3 open</span>
      <span style="color:var(--t3);font-size:9px">sync 0:42</span>
    </div>

    <div class="divider"></div>

    <div class="avatar">M</div>
  </div>
</body>
</html>
