<!-- @dsCard group="Dashboard" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:#000; --s1:#0C0C0C; --s2:#131313; --s3:#1A1A1A;
    --bd:rgba(255,255,255,0.06); --bd2:rgba(255,255,255,0.10);
    --t1:#F2F2F2; --t2:#707070; --t3:#383838;
    --ac:#4D8FFF; --gr2:#00FF85; --go2:#FFB830;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; display: flex; height: 400px; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--s1);
    border-right: 1px solid var(--bd2);
    display: flex; flex-direction: column;
    padding: 0;
  }
  .logo-area {
    padding: 16px 18px;
    border-bottom: 1px solid var(--bd);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, #FFB830, #F5B040);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #000;
    box-shadow: 0 0 6px rgba(232,201,106,0.3);
  }
  .brand { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .nav { flex: 1; padding: 10px 0; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; margin: 1px 8px; border-radius: 8px;
    font-size: 13px; color: var(--t2); cursor: pointer; transition: all 0.12s;
  }
  .nav-item:hover { background: var(--s3); color: var(--t1); }
  .nav-item.active { background: rgba(77,143,255,0.12); color: var(--ac); }
  .nav-icon { width: 16px; height: 16px; opacity: 0.6; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .footer { padding: 12px; border-top: 1px solid var(--bd); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--s3); border: 1px solid var(--bd2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--go2); }
  .user-row { display: flex; align-items: center; gap: 10px; }
  .user-name { font-size: 12px; font-weight: 500; }
  .user-role { font-size: 10px; color: var(--t3); }
  .content { flex: 1; background: var(--bg); padding: 24px; display: flex; align-items: center; justify-content: center; color: var(--t3); font-size: 12px; }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="logo-area">
      <div class="logo-mark">V</div>
      <span class="brand">VELQUOR</span>
    </div>
    <nav class="nav">
      <div class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Overview
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 12l3-4 3 2 3-5 3 3"/><path stroke="currentColor" stroke-width="1.5" d="M2 12l3-4 3 2 3-5 3 3" fill="none"/></svg>
        Trading
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6" opacity=".3"/><path d="M8 4v4l3 3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        Portfolio
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="3" width="12" height="10" rx="2" opacity=".3"/><path d="M5 7h6M5 10h4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        Journal
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2l1.5 4.5H14l-3.7 2.7 1.4 4.3L8 11 4.3 13.5l1.4-4.3L2 6.5h4.5z" opacity=".8"/></svg>
        Habits
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="2" opacity=".3"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        Tasks
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="5" opacity=".3"/><circle cx="8" cy="8" r="2"/></svg>
        Macro
      </div>
    </nav>
    <div class="footer">
      <div class="user-row">
        <div class="avatar">M</div>
        <div>
          <div class="user-name">Marco</div>
          <div class="user-role">Pro Trader</div>
        </div>
      </div>
    </div>
  </div>
  <div class="content">← Sidebar / 220px fixed</div>
</body>
</html>
