<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:#000; --s1:#0C0C0C; --s3:#1A1A1A; --bd:rgba(255,255,255,0.06); --bd2:rgba(255,255,255,0.10);
    --t1:#F2F2F2; --t2:#707070; --t3:#383838;
    --ac:#4D8FFF; --gr2:#00FF85; --re:#FF3347; --am2:#F5B040; --pu:#A87EFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; }
  .header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--bd2);
    display: grid; grid-template-columns: 1fr 1fr 1fr auto;
    gap: 12px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--t3);
  }
  .row {
    display: grid; grid-template-columns: 1fr 1fr 1fr auto;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--bd);
    align-items: center;
    transition: background 0.12s;
    cursor: pointer;
  }
  .row:hover { background: var(--s3); }
  .symbol { font-weight: 500; font-size: 13px; }
  .badge {
    display: inline-flex; align-items: center; font-weight: 500;
    font-size: 10px; padding: 1px 6px; border-radius: 5px;
    letter-spacing: 0.02em; line-height: 16px; border: 1px solid transparent;
  }
  .session { font-size: 11px; color: var(--t3); margin-top: 2px; }
  .setup { font-size: 12px; color: var(--t2); }
  .pnl { font-weight: 500; font-size: 13px; text-align: right; }
  .pips { font-size: 11px; color: var(--t3); text-align: right; margin-top: 2px; }
</style>
</head>
<body>
  <div class="header">
    <span>Symbol</span>
    <span>Session</span>
    <span>Setup</span>
    <span style="text-align:right">P&amp;L</span>
  </div>

  <div class="row">
    <div>
      <div class="symbol">EURUSD</div>
      <div style="margin-top:4px"><span class="badge" style="background:rgba(52,199,89,0.1);color:#00FF85;border-color:rgba(52,199,89,0.2)">BUY</span></div>
    </div>
    <div>
      <span class="badge" style="background:rgba(79,142,247,0.1);color:#4D8FFF;border-color:rgba(79,142,247,0.2)">London</span>
      <div class="session">08 Jul · 09:42</div>
    </div>
    <div class="setup">Break of Structure</div>
    <div>
      <div class="pnl" style="color:#00FF85">+$340.00</div>
      <div class="pips" >+24.0p</div>
    </div>
  </div>

  <div class="row">
    <div>
      <div class="symbol">GBPJPY</div>
      <div style="margin-top:4px"><span class="badge" style="background:rgba(255,59,48,0.1);color:#FF3347;border-color:rgba(255,59,48,0.2)">SELL</span></div>
    </div>
    <div>
      <span class="badge" style="background:rgba(212,160,52,0.1);color:#FFB830;border-color:rgba(212,160,52,0.2)">Overlap</span>
      <div class="session">08 Jul · 14:15</div>
    </div>
    <div class="setup">Liquidity Grab</div>
    <div>
      <div class="pnl" style="color:#FF3347">-$120.00</div>
      <div class="pips">-8.5p</div>
    </div>
  </div>

  <div class="row">
    <div>
      <div class="symbol">USDJPY</div>
      <div style="margin-top:4px"><span class="badge" style="background:rgba(52,199,89,0.1);color:#00FF85;border-color:rgba(52,199,89,0.2)">BUY</span></div>
    </div>
    <div>
      <span class="badge" style="background:rgba(224,152,64,0.1);color:#F5B040;border-color:rgba(224,152,64,0.2)">New York</span>
      <div class="session">07 Jul · 16:05</div>
    </div>
    <div class="setup">Fair Value Gap</div>
    <div>
      <div class="pnl" style="color:#00FF85">+$500.00</div>
      <div class="pips">+35.0p</div>
    </div>
  </div>

  <div class="row">
    <div>
      <div class="symbol">XAUUSD</div>
      <div style="margin-top:4px">
        <span class="badge" style="background:rgba(255,59,48,0.1);color:#FF3347;border-color:rgba(255,59,48,0.2)">SELL</span>
        <span class="badge" style="background:rgba(255,59,48,0.08);color:#FF3347;border-color:rgba(255,59,48,0.18);margin-left:4px">no screenshot</span>
      </div>
    </div>
    <div>
      <span class="badge" style="background:rgba(155,114,240,0.1);color:#A87EFF;border-color:rgba(155,114,240,0.2)">Asian</span>
      <div class="session">07 Jul · 01:22</div>
    </div>
    <div class="setup">Order Block</div>
    <div>
      <div class="pnl" style="color:#00FF85">+$210.00</div>
      <div class="pips">+21.0p</div>
    </div>
  </div>
</body>
</html>
