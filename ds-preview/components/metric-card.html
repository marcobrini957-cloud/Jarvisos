<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:#000; --s1:#0C0C0C; --bd:rgba(255,255,255,0.06); --bd2:rgba(255,255,255,0.10);
    --t1:#F2F2F2; --t2:#707070; --t3:#383838;
    --gr2:#00FF85; --re:#FF3347; --am2:#F5B040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card {
    background: var(--s1);
    border: 1px solid var(--bd);
    border-radius: 12px;
    padding: 18px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-title { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--t3); }
  .card-value { font-size: 28px; font-weight: 700; line-height: 1.1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
  .card-sub { font-size: 12px; font-weight: 400; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="card-title">Net P&amp;L Today</div>
      <div class="card-value" style="color:#00FF85">+$840</div>
      <div class="card-sub" style="color:#00FF85">↑ 2 winning trades</div>
    </div>
    <div class="card">
      <div class="card-title">Win Rate</div>
      <div class="card-value" style="color:#F2F2F2">68%</div>
      <div class="card-sub" style="color:#707070">Last 30 days</div>
    </div>
    <div class="card">
      <div class="card-title">Drawdown</div>
      <div class="card-value" style="color:#FF3347">-$320</div>
      <div class="card-sub" style="color:#FF3347">↓ Max daily limit 60%</div>
    </div>
    <div class="card">
      <div class="card-title">Net Worth</div>
      <div class="card-value" style="color:#F2F2F2; font-size:22px">€ 148,200</div>
      <div class="card-sub" style="color:#707070">Across all accounts</div>
    </div>
    <div class="card">
      <div class="card-title">Avg R:R</div>
      <div class="card-value" style="color:#F5B040">1.8</div>
      <div class="card-sub" style="color:#707070">This month</div>
    </div>
    <div class="card">
      <div class="card-title">Trades Taken</div>
      <div class="card-value" style="color:#F2F2F2">14</div>
      <div class="card-sub" style="color:#707070">July 2026</div>
    </div>
  </div>
</body>
</html>
