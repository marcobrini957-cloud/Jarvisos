<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:#000; --s1:#0C0C0C; --bd:rgba(255,255,255,0.06);
    --t1:#F2F2F2; --t2:#707070; --t3:#505050;
    --ac:#4D8FFF; --gr2:#00FF85; --re:#FF3347; --am2:#F5B040; --pu:#A87EFF; --go2:#FFB830;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; padding: 24px; }
  h3 { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--t3); margin-bottom: 10px; }
  .section { margin-bottom: 22px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge {
    display: inline-flex; align-items: center; font-weight: 500;
    font-size: 10px; padding: 1px 6px; border-radius: 5px;
    letter-spacing: 0.02em; white-space: nowrap; line-height: 16px;
    border: 1px solid transparent;
  }
</style>
</head>
<body>
  <div class="section">
    <h3>Trade Direction</h3>
    <div class="row">
      <span class="badge" style="background:rgba(52,199,89,0.1);color:#00FF85;border-color:rgba(52,199,89,0.2)">BUY</span>
      <span class="badge" style="background:rgba(255,59,48,0.1);color:#FF3347;border-color:rgba(255,59,48,0.2)">SELL</span>
    </div>
  </div>

  <div class="section">
    <h3>Session</h3>
    <div class="row">
      <span class="badge" style="background:rgba(79,142,247,0.1);color:#4D8FFF;border-color:rgba(79,142,247,0.2)">London</span>
      <span class="badge" style="background:rgba(224,152,64,0.1);color:#F5B040;border-color:rgba(224,152,64,0.2)">New York</span>
      <span class="badge" style="background:rgba(155,114,240,0.1);color:#A87EFF;border-color:rgba(155,114,240,0.2)">Asian</span>
      <span class="badge" style="background:rgba(212,160,52,0.1);color:#FFB830;border-color:rgba(212,160,52,0.2)">Overlap</span>
    </div>
  </div>

  <div class="section">
    <h3>Outcome</h3>
    <div class="row">
      <span class="badge" style="background:rgba(52,199,89,0.1);color:#00FF85;border-color:rgba(52,199,89,0.2)">WIN</span>
      <span class="badge" style="background:rgba(255,59,48,0.1);color:#FF3347;border-color:rgba(255,59,48,0.2)">LOSS</span>
    </div>
  </div>

  <div class="section">
    <h3>Priority</h3>
    <div class="row">
      <span class="badge" style="background:rgba(255,59,48,0.1);color:#FF3347;border-color:rgba(255,59,48,0.2)">high</span>
      <span class="badge" style="background:rgba(224,152,64,0.08);color:#F5B040;border-color:rgba(224,152,64,0.16)">medium</span>
      <span class="badge" style="background:rgba(136,146,160,0.08);color:#505050;border-color:rgba(136,146,160,0.12)">low</span>
    </div>
  </div>

  <div class="section">
    <h3>Sentiment</h3>
    <div class="row">
      <span class="badge" style="background:rgba(52,199,89,0.08);color:#00FF85;border-color:rgba(52,199,89,0.18)">bullish</span>
      <span class="badge" style="background:rgba(255,59,48,0.1);color:#FF3347;border-color:rgba(255,59,48,0.2)">bearish</span>
      <span class="badge" style="background:rgba(136,146,160,0.08);color:#505050;border-color:rgba(136,146,160,0.12)">neutral</span>
    </div>
  </div>

  <div class="section">
    <h3>Status</h3>
    <div class="row">
      <span class="badge" style="background:rgba(79,142,247,0.1);color:#4D8FFF;border-color:rgba(79,142,247,0.2)">open</span>
      <span class="badge" style="background:rgba(136,146,160,0.08);color:#505050;border-color:rgba(136,146,160,0.12)">closed</span>
      <span class="badge" style="background:rgba(224,152,64,0.08);color:#F5B040;border-color:rgba(224,152,64,0.16)">pending</span>
      <span class="badge" style="background:rgba(52,199,89,0.08);color:#00FF85;border-color:rgba(52,199,89,0.18)">opportunity</span>
      <span class="badge" style="background:rgba(255,59,48,0.1);color:#FF3347;border-color:rgba(255,59,48,0.2)">risk</span>
    </div>
  </div>
</body>
</html>
