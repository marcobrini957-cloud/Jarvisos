<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:#000; --s1:#0C0C0C; --bd:rgba(255,255,255,0.06); --bd2:rgba(255,255,255,0.10);
    --t1:#F2F2F2; --t2:#707070; --t3:#505050;
    --ac:#4D8FFF; --ac2:#82AAFF; --go2:#FFB830; --pu2:#C0A0FF; --cy2:#00EEFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .clock { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
  .divider { width: 1px; height: 16px; background: var(--bd2); }
  .mono { font-family: monospace; }
  .pill { font-size: 12px; font-weight: 700; padding: 1px 7px; border-radius: 4px; font-family: monospace; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--t3); margin-bottom: 8px; }
</style>
</head>
<body>
  <div>
    <div class="label">London Session Active</div>
    <div class="clock">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="live-dot" style="background:#00EEFF;box-shadow:0 0 0 2px rgba(0,222,232,0.2),0 0 10px rgba(0,222,232,0.55)"></span>
        <span style="font-size:13px;font-weight:600;color:#00EEFF">London Session</span>
      </div>
      <div class="divider"></div>
      <div style="display:flex;gap:12px;align-items:center">
        <span class="mono" style="font-size:12px;color:var(--t2)">10:42:08 CET</span>
        <span class="mono" style="font-size:11px;color:var(--t3)">09:42:08 UTC</span>
      </div>
      <div class="divider"></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--t3)">London closes in</span>
        <span class="pill" style="color:#00EEFF;background:rgba(0,238,255,0.08);border:1px solid rgba(0,238,255,0.18)">6h 48m</span>
      </div>
    </div>
  </div>

  <div>
    <div class="label">NY/London Overlap</div>
    <div class="clock">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="live-dot" style="background:#FFB830;box-shadow:0 0 0 2px rgba(255,184,48,0.2),0 0 10px rgba(255,184,48,0.55)"></span>
        <span style="font-size:13px;font-weight:600;color:#FFB830">London/NY Overlap</span>
      </div>
      <div class="divider"></div>
      <div style="display:flex;gap:12px;align-items:center">
        <span class="mono" style="font-size:12px;color:var(--t2)">15:14:33 CET</span>
        <span class="mono" style="font-size:11px;color:var(--t3)">14:14:33 UTC</span>
      </div>
      <div class="divider"></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--t3)">Overlap closes in</span>
        <span class="pill" style="color:#FFB830;background:rgba(255,184,48,0.08);border:1px solid rgba(255,184,48,0.18)">16m</span>
      </div>
    </div>
  </div>

  <div>
    <div class="label">Markets Closed</div>
    <div class="clock">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="live-dot" style="background:var(--t3);box-shadow:none;animation:none"></span>
        <span style="font-size:13px;font-weight:600;color:var(--t3)">Markets Closed</span>
      </div>
      <div class="divider"></div>
      <div style="display:flex;gap:12px;align-items:center">
        <span class="mono" style="font-size:12px;color:var(--t2)">04:05:17 CET</span>
        <span class="mono" style="font-size:11px;color:var(--t3)">03:05:17 UTC</span>
      </div>
      <div class="divider"></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--t3)">London opens in</span>
        <span class="pill" style="color:#505050;background:rgba(80,80,80,0.08);border:1px solid rgba(80,80,80,0.16)">4h 55m</span>
      </div>
    </div>
  </div>
</body>
</html>
