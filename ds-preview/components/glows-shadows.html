<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:#000; --s1:#0C0C0C; --bd2:rgba(255,255,255,0.10);
    --t1:#F2F2F2; --t2:#707070; --t3:#505050;
    --ac:#4D8FFF; --gr2:#00FF85; --re:#FF3347; --go2:#FFB830; --am2:#F5B040; --pu:#A87EFF; --cy:#00CCDD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; padding: 24px; }
  h3 { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--t3); margin-bottom: 14px; }
  .section { margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .glow-card {
    background: var(--s1);
    border: 1px solid var(--bd2);
    border-radius: 12px;
    padding: 16px;
    font-size: 12px;
    text-align: center;
  }
  .dot { width: 32px; height: 32px; border-radius: 50%; margin: 0 auto 10px; }
  .name { font-size: 11px; color: var(--t2); margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="section">
    <h3>Card Glow Variants</h3>
    <div class="grid">
      <div class="glow-card" style="box-shadow:0 0 0 1px rgba(77,143,255,0.2),0 0 28px rgba(77,143,255,0.07),0 4px 20px rgba(0,0,0,0.5);border-color:rgba(77,143,255,0.2)">
        <div class="dot" style="background:#4D8FFF;box-shadow:0 0 16px rgba(77,143,255,0.6)"></div>
        <div class="name" style="color:#4D8FFF">card-glow-blue</div>
      </div>
      <div class="glow-card" style="box-shadow:0 0 0 1px rgba(0,232,122,0.18),0 0 28px rgba(0,232,122,0.07),0 4px 20px rgba(0,0,0,0.5);border-color:rgba(0,232,122,0.18)">
        <div class="dot" style="background:#00FF85;box-shadow:0 0 16px rgba(0,232,122,0.6)"></div>
        <div class="name" style="color:#00FF85">card-glow-green</div>
      </div>
      <div class="glow-card" style="box-shadow:0 0 0 1px rgba(255,61,80,0.18),0 0 28px rgba(255,61,80,0.07),0 4px 20px rgba(0,0,0,0.5);border-color:rgba(255,61,80,0.18)">
        <div class="dot" style="background:#FF3347;box-shadow:0 0 16px rgba(255,61,80,0.6)"></div>
        <div class="name" style="color:#FF3347">card-glow-red</div>
      </div>
      <div class="glow-card" style="box-shadow:0 0 0 1px rgba(255,176,48,0.18),0 0 28px rgba(255,176,48,0.07),0 4px 20px rgba(0,0,0,0.5);border-color:rgba(255,176,48,0.18)">
        <div class="dot" style="background:#FFB830;box-shadow:0 0 16px rgba(255,176,48,0.6)"></div>
        <div class="name" style="color:#FFB830">card-glow-gold</div>
      </div>
      <div class="glow-card" style="box-shadow:0 0 0 1px rgba(155,114,240,0.18),0 0 28px rgba(155,114,240,0.07),0 4px 20px rgba(0,0,0,0.5);border-color:rgba(155,114,240,0.18)">
        <div class="dot" style="background:#A87EFF;box-shadow:0 0 16px rgba(155,114,240,0.6)"></div>
        <div class="name" style="color:#A87EFF">card-glow-purple</div>
      </div>
      <div class="glow-card" style="box-shadow:0 0 0 1px rgba(0,191,204,0.2),0 0 28px rgba(0,191,204,0.08),0 4px 20px rgba(0,0,0,0.5);border-color:rgba(0,191,204,0.2)">
        <div class="dot" style="background:#00CCDD;box-shadow:0 0 16px rgba(0,191,204,0.6)"></div>
        <div class="name" style="color:#00CCDD">card-glow-cyan</div>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Live Indicators</h3>
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:7px;height:7px;border-radius:50%;background:#00EEFF;box-shadow:0 0 0 2px rgba(0,222,232,0.2),0 0 8px rgba(0,222,232,0.5);display:inline-block"></span>
        <span style="font-size:12px;color:#707070">live-dot (cyan)</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:7px;height:7px;border-radius:50%;background:#00FF85;box-shadow:0 0 0 2px rgba(0,232,122,0.2),0 0 8px rgba(0,232,122,0.5);display:inline-block"></span>
        <span style="font-size:12px;color:#707070">live-dot-green</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:7px;height:7px;border-radius:50%;background:#FF3347;box-shadow:0 0 0 2px rgba(255,61,80,0.2),0 0 8px rgba(255,61,80,0.5);display:inline-block"></span>
        <span style="font-size:12px;color:#707070">live-dot-red</span>
      </div>
    </div>
  </div>
</body>
</html>
