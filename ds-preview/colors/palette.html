<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:#000; --s1:#0C0C0C; --s2:#131313; --s3:#1A1A1A; --s4:#222;
    --bd:rgba(255,255,255,0.06); --bd2:rgba(255,255,255,0.10); --bd3:rgba(255,255,255,0.20);
    --t1:#F2F2F2; --t2:#707070; --t3:#505050;
    --ac:#4D8FFF; --gr:#00D96E; --gr2:#00FF85; --re:#FF3347;
    --go:#E8980A; --go2:#FFB830; --am:#D98C20; --am2:#F5B040;
    --pu:#A87EFF; --cy:#00CCDD; --cy2:#00EEFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; font-size: 12px; padding: 24px; }
  h2 { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--t3); margin-bottom: 14px; }
  .section { margin-bottom: 28px; }
  .swatches { display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .chip { width: 48px; height: 48px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); }
  .name { font-size: 9px; color: var(--t3); letter-spacing: 0.04em; text-align: center; }
  .hex { font-size: 9px; color: var(--t2); font-family: monospace; }
  .surfaces { display: flex; gap: 6px; }
  .surf { height: 40px; flex: 1; border-radius: 8px; border: 1px solid var(--bd2); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--t3); }
</style>
</head>
<body>
  <div class="section">
    <h2>Surfaces</h2>
    <div class="surfaces">
      <div class="surf" style="background:#000">bg</div>
      <div class="surf" style="background:#0C0C0C">s1</div>
      <div class="surf" style="background:#131313">s2</div>
      <div class="surf" style="background:#1A1A1A">s3</div>
      <div class="surf" style="background:#222">s4</div>
    </div>
  </div>

  <div class="section">
    <h2>Text</h2>
    <div class="swatches">
      <div class="swatch"><div class="chip" style="background:#F2F2F2"></div><div class="name">t1</div><div class="hex">#F2F2F2</div></div>
      <div class="swatch"><div class="chip" style="background:#707070"></div><div class="name">t2</div><div class="hex">#707070</div></div>
      <div class="swatch"><div class="chip" style="background:#505050"></div><div class="name">t3</div><div class="hex">#505050</div></div>
    </div>
  </div>

  <div class="section">
    <h2>Accents</h2>
    <div class="swatches">
      <div class="swatch"><div class="chip" style="background:#4D8FFF"></div><div class="name">blue (ac)</div><div class="hex">#4D8FFF</div></div>
      <div class="swatch"><div class="chip" style="background:#00D96E"></div><div class="name">green</div><div class="hex">#00D96E</div></div>
      <div class="swatch"><div class="chip" style="background:#00FF85"></div><div class="name">green2</div><div class="hex">#00FF85</div></div>
      <div class="swatch"><div class="chip" style="background:#FF3347"></div><div class="name">red</div><div class="hex">#FF3347</div></div>
    </div>
  </div>

  <div class="section">
    <h2>Gold / Amber</h2>
    <div class="swatches">
      <div class="swatch"><div class="chip" style="background:#E8980A"></div><div class="name">gold</div><div class="hex">#E8980A</div></div>
      <div class="swatch"><div class="chip" style="background:#FFB830"></div><div class="name">gold2</div><div class="hex">#FFB830</div></div>
      <div class="swatch"><div class="chip" style="background:#D98C20"></div><div class="name">amber</div><div class="hex">#D98C20</div></div>
      <div class="swatch"><div class="chip" style="background:#F5B040"></div><div class="name">amber2</div><div class="hex">#F5B040</div></div>
    </div>
  </div>

  <div class="section">
    <h2>Purple / Cyan</h2>
    <div class="swatches">
      <div class="swatch"><div class="chip" style="background:#A87EFF"></div><div class="name">purple</div><div class="hex">#A87EFF</div></div>
      <div class="swatch"><div class="chip" style="background:#00CCDD"></div><div class="name">cyan</div><div class="hex">#00CCDD</div></div>
      <div class="swatch"><div class="chip" style="background:#00EEFF"></div><div class="name">cyan2</div><div class="hex">#00EEFF</div></div>
    </div>
  </div>
</body>
</html>
