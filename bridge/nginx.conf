# Drop this file at /etc/nginx/sites-available/velquor-bridge
# Then: ln -s /etc/nginx/sites-available/velquor-bridge /etc/nginx/sites-enabled/
# certbot --nginx -d bridge.velquor.app

server {
    listen 80;
    server_name bridge.velquor.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bridge.velquor.app;

    # Filled in by certbot
    ssl_certificate     /etc/letsencrypt/live/bridge.velquor.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bridge.velquor.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Only the endpoints the EA, dashboard, and admin console call
    location ~ ^/(sync|disconnect|health|copy/(signal|poll|ack)|admin/(stats|reload))$ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # /copy/poll long-polls hold the connection up to 25s
        proxy_read_timeout 40s;
        proxy_send_timeout 40s;
        client_max_body_size 2m;
    }

    # Block everything else
    location / {
        return 404;
    }

    # Basic hardening
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;
}
